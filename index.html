<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraSense Portal Login</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="shared/css/variables.css">
    <style>
        body { 
            margin: 0; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: var(--font-family); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        .header { 
            text-align: center; 
            margin-bottom: 40px; 
        }
        .header h1 { 
            font-size: 32px; 
            margin: 0 0 10px 0; 
        }
        .header p { 
            color: var(--text-secondary); 
            margin: 0; 
            font-size: 16px;
        }
        .cards { 
            display: flex; 
            gap: 24px; 
            flex-wrap: wrap; 
            justify-content: center; 
        }
        .card { 
            background: var(--bg-panel); 
            border: 1px solid var(--border-subtle); 
            border-radius: 16px; 
            padding: 40px 24px; 
            min-width: 200px; 
            min-height: 150px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease; 
            text-align: center; 
        }
        .card:hover { 
            transform: scale(0.98); 
            background: rgba(30, 41, 59, 0.9); 
        }
        .card.patient:hover { 
            border-color: var(--accent-patient); 
        }
        .card.clinician:hover { 
            border-color: var(--accent-clinician); 
        }
        .card i { 
            font-size: 48px; 
            margin-bottom: 16px; 
        }
        .card.patient i { 
            color: var(--accent-patient); 
        }
        .card.clinician i { 
            color: var(--accent-clinician); 
        }
        .card h3 { 
            margin: 0 0 8px 0; 
            font-size: 20px; 
            color: var(--text-main);
        }
        .card p { 
            margin: 0; 
            color: var(--text-secondary); 
            font-size: 14px; 
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AuraSense System</h1>
        <p>Unified Portal Access</p>
    </div>
    
    <div class="cards">
        <div class="card patient" onclick="enterPortal('patient')" role="button" tabindex="0">
            <i class="ph ph-user"></i>
            <h3>Patient Portal</h3>
            <p>Access your sleeve data</p>
        </div>
        
        <div class="card clinician" onclick="enterPortal('clinician')" role="button" tabindex="0">
            <i class="ph ph-file-pulse"></i>
            <h3>Clinician Portal</h3>
            <p>Real-time monitoring</p>
        </div>
    </div>

    <!-- Auth routing -->
    <script src="shared/js/auth.js"></script>
</body>
</html>
